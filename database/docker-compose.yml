services:
    oracle-db:
        image: container-registry.oracle.com/database/free:latest
        container_name: DB_FINANCAS
        ports:
            - "1521:1521"
        environment:
            - ORACLE_PWD=abc13245
            - ORACLE_CHARACTERSET=AL32UTF8
            - TZ=America/Sao_Paulo
        volumes:
        - financas:/opt/oracle/oradata
        restart: unless-stopped

volumes:
  financas: